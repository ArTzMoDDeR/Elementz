<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #applixir_vanishing_div {
    width: 100%;
    height: 100%;
    position: relative;
  }
  #applixir_vanishing_div > * {
    position: absolute !important;
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
  }
  #applixir_vanishing_div iframe,
  #applixir_vanishing_div video {
    position: absolute !important;
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
    border: none !important;
  }
</style>
</head>
<body>
  <div id="applixir_vanishing_div"></div>
  <script>
    var apiKey = '';
    var initAttempts = 0;

    console.log('[applixir-player] iframe document loaded, origin:', window.location.origin);

    function tryInit() {
      initAttempts++;
      console.log('[applixir-player] tryInit attempt', initAttempts, '| initializeAndOpenPlayer available:', typeof initializeAndOpenPlayer);
      if (typeof initializeAndOpenPlayer !== 'function') {
        if (initAttempts < 40) {
          setTimeout(tryInit, 250);
        } else {
          console.log('[applixir-player] gave up waiting for SDK after', initAttempts, 'attempts');
          window.parent.postMessage({ type: 'applixir_error', error: 'SDK never ready' }, '*');
        }
        return;
      }
      console.log('[applixir-player] calling initializeAndOpenPlayer with apiKey:', apiKey ? apiKey.slice(0,8) + '...' : 'EMPTY');
      try {
        initializeAndOpenPlayer({
          apiKey: apiKey,
          injectionElementId: 'applixir_vanishing_div',
          adStatusCallbackFn: function(status) {
            console.log('[applixir-player] ad status:', status);
            window.parent.postMessage({ type: 'applixir_status', status: status }, '*');
          },
          adErrorCallbackFn: function(err) {
            console.log('[applixir-player] ad error:', err);
            window.parent.postMessage({ type: 'applixir_error', error: String(err) }, '*');
          }
        });
      } catch(e) {
        console.log('[applixir-player] initializeAndOpenPlayer threw:', e);
        window.parent.postMessage({ type: 'applixir_error', error: String(e) }, '*');
      }
    }

    window.addEventListener('message', function(e) {
      console.log('[applixir-player] received message from parent:', e.data && e.data.type, '| origin:', e.origin);
      if (e.data && e.data.type === 'applixir_init' && e.data.apiKey) {
        apiKey = e.data.apiKey;
        console.log('[applixir-player] got apiKey, loading SDK from CDN...');
        var s = document.createElement('script');
        s.src = 'https://cdn.applixir.com/applixir.app.v6.0.1.js';
        s.onload = function() {
          console.log('[applixir-player] SDK script loaded successfully');
          tryInit();
        };
        s.onerror = function(err) {
          console.log('[applixir-player] SDK script failed to load:', err);
          window.parent.postMessage({ type: 'applixir_error', error: 'SDK load failed' }, '*');
        };
        document.head.appendChild(s);
      }
    });
  </script>
</body>
</html>

workflows:
  ios-workflow:
    name: Elementz iOS
    max_build_duration: 120
    integrations:
      app_store_connect: CodeMagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.eugenelabaleine.elementz
      node: latest
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        DEVELOPMENT_TEAM: "JLTG5A7S34"
    scripts:
      - name: Install dependencies
        script: |
          npm install @capacitor/app @capacitor/haptics @capacitor/keyboard @capacitor/status-bar @capacitor-community/admob
          npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install pods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="elementz" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -destination "generic/platform=iOS" \
            ONLY_ACTIVE_ARCH=NO
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false